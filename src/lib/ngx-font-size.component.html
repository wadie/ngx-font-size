<div #fontSizeContainer class="fontSizeIcons" [style.color]="iconColor">
  <div [class.selected]="selectedFont === 'lg'" (click)="toggleFontIcon('lg')">
    A
  </div>

  <div [class.selected]="selectedFont === 'md'" (click)="toggleFontIcon('md')">
    A
  </div>

  <div [class.selected]="selectedFont === 'sm'" (click)="toggleFontIcon('sm')">
    A
  </div>
</div>
