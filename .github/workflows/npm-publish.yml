name: npm-publish
on: push

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install
      - run: npm run build:release
      - run: npm publish dist/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
